<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Performance Graph</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            min-height: 100vh;
        }

        .page {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
        }

        .container {
            width: 90%;
            max-width: 900px;
            background: rgba(255,255,255,0.15);
            border-radius: 18px;
            padding: 30px;
            color: #fff;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .input-box {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-box input {
            padding: 10px;
            border-radius: 8px;
            border: none;
        }

        .btn-group {
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        canvas {
            display: block;
            margin: 20px auto;
            background: #fff;
            border-radius: 12px;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            font-size: 14px;
        }

        .color-box {
            width: 15px;
            height: 15px;
            margin-right: 8px;
            border-radius: 4px;
        }

        .result {
            background: #ffffff;
            color: #333;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
        }

        .back-btn {
            margin-top: 25px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            background: #fff;
            color: #007acc;
        }
    </style>
</head>
<body>

<div class="page">
    <div class="container">

        <h2>📊 Performance Analysis</h2>

        <div class="input-box">
            <input type="number" id="marks" placeholder="Total Marks (%)">
            <input type="number" id="attendance" placeholder="Attendance (%)">
            <input type="number" id="hours" placeholder="Daily Study Hours">
        </div>

        <div class="btn-group">
            <button onclick="drawGraph()">Generate Graph</button>
            <button onclick="clearAll()">Clear</button>
        </div>

        <canvas id="chart" width="300" height="300"></canvas>

        <div class="legend">
            <div class="legend-item">
                <div class="color-box" style="background:#4caf50"></div> Marks
            </div>
            <div class="legend-item">
                <div class="color-box" style="background:#2196f3"></div> Attendance
            </div>
            <div class="legend-item">
                <div class="color-box" style="background:#ff9800"></div> Study Hours
            </div>
        </div>

        <div class="result" id="resultBox"></div>

        <button class="back-btn" onclick="goHome()">⬅ Back to Home</button>

    </div>
</div>

<script>
function drawGraph() {
    const marks = Number(document.getElementById("marks").value);
    const attendance = Number(document.getElementById("attendance").value);
    const hours = Number(document.getElementById("hours").value);

    if (!marks || !attendance || !hours) {
        alert("Please enter all values");
        return;
    }

    const canvas = document.getElementById("chart");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const data = [
        { label: "Marks", value: marks, color: "#4caf50" },
        { label: "Attendance", value: attendance, color: "#2196f3" },
        { label: "Study Hours", value: hours * 10, color: "#ff9800" }
    ];

    const total = data.reduce((sum, d) => sum + d.value, 0);
    let angle = 0;

    data.forEach(d => {
        const slice = (d.value / total) * Math.PI * 2;

        ctx.beginPath();
        ctx.moveTo(150, 150);
        ctx.arc(150, 150, 130, angle, angle + slice);
        ctx.fillStyle = d.color;
        ctx.fill();

        // ===== LABEL INSIDE SLICE =====
        const midAngle = angle + slice / 2;
        const x = 150 + Math.cos(midAngle) * 80;
        const y = 150 + Math.sin(midAngle) * 80;

        const percent = ((d.value / total) * 100).toFixed(1);

        ctx.fillStyle = "#fff";
        ctx.font = "bold 12px Arial";
        ctx.textAlign = "center";
        ctx.fillText(d.label, x, y - 5);
        ctx.fillText(percent + "%", x, y + 10);

        angle += slice;
    });

    const markGrade = marks >= 85 ? "A" : marks >= 70 ? "B" : marks >= 50 ? "C" : "D";
    const attGrade = attendance >= 85 ? "Excellent" : attendance >= 75 ? "Good" : "Poor";

    document.getElementById("resultBox").innerHTML = `
        <p><b>Marks:</b> ${marks}% → Grade ${markGrade}</p>
        <p><b>Attendance:</b> ${attendance}% → ${attGrade}</p>
        <p><b>Study Hours:</b> ${hours} hrs/day</p>
        <p><b>Overall Performance:</b> ${marks >= 70 && attendance >= 75 ? "👍 Good" : "⚠ Needs Improvement"}</p>
    `;
}

function clearAll() {
    document.getElementById("marks").value = "";
    document.getElementById("attendance").value = "";
    document.getElementById("hours").value = "";
    document.getElementById("resultBox").innerHTML = "";
    document.getElementById("chart").getContext("2d").clearRect(0,0,300,300);
}

function goHome() {
    window.location.href = "homepage.html";
}
</script>

</body>
</html>
